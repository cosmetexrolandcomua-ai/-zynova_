роїтин; окрема категорія суглобів.", "badges": ["Kirkland"], "promoType": "Стандарт", "slug": "kirkland-глю.ко.замін-з-хонд.рої.тином-280-шт"}, {"id": 211, "number": "5", "sku": "211", "name": "Мазь від болів у суглобах Бенгей Bengay", "brand": "Bengay", "category": "Здоров’я та комфорт", "subcategory": "Суглоби, м’язи та знеболення", "categoryPath": "Здоров’я та комфорт > Суглоби, м’язи та знеболення", "sourceSection": "Вся продукція", "price": 393, "oldPrice": null, "discountPercent": null, "availability": "В наявності", "images": ["https://skinel.com.ua/content/images/46/55581939270958_+00f4f70ea3.png", "https://skinel.com.ua/content/images/46/72003686194041_+87d80d82cb.png"], "image": "https://skinel.com.ua/content/images/46/55581939270958_+00f4f70ea3.png", "shortDescription": "Бенгей (Bengay) — це перевірений часом терапевтичний засіб місцевої дії, розроблений для швидкого полегшення болю в м'язах та суглобах. Крем турецького виробництва поєднує в собі потужну протизапальну силу метилсаліцилату та охолоджувальну дію натурального...", "descriptionHtml": "<p>Бенгей (Bengay) — це перевірений часом терапевтичний засіб місцевої дії, розроблений для швидкого полегшення болю в м'язах та суглобах. Крем турецького виробництва поєднує в собі потужну протизапальну силу метилсаліцилату та охолоджувальну дію натурального ментолу. Унікальність формули полягає у ефекті «подвійної дії»: одразу після нанесення ментол викликає відчуття прохолоди, яке відволікає від болю, після чого метилсаліцилат проникає глибоко в тканини, знімаючи запалення та покращуючи мікроциркуляцію крові. Бенгей діє як ефективний міорелаксант, допомагаючи м'язам розслабитися після надмірних фізичних навантажень, спортивних тренувань або тривалого перебування в незручній позі. Засіб широко застосовується при артритах, розтягненнях зв’язок, забиттях та болях у спині. Завдяки легкій текстурі крем швидко поглинається шкірою, починаючи свою роботу безпосередньо в осередку дискомфорту. <strong>Бенгей — це надійний помічник для відновлення рухливості та повернення до активного життя без болю.<\/strong><\/p> <p><strong>Активні компоненти (Складники)<\/strong><\/p>\n<ul>\n<li><strong>Метилсаліцилат:<\/strong> похідна саліцилової кислоти, що чинить виражену знеболювальну та протизапальну дію. Він гальмує синтез простагландинів у зоні ураження, зменшуючи набряк та покращуючи проникність капілярів.<\/li>\n<li><strong>Ментол:<\/strong> викликає подразнення нервових закінчень, що супроводжується відчуттям холоду та легкого поколювання. Це забезпечує відволікаючий ефект та сприяє звуженню судин на початковому етапі для зменшення набряклості.<\/li>\n<li><strong>Спеціальна жирова основа:<\/strong> забезпечує рівномірний розподіл активних речовин та їхню тривалу дію на проблемну зону, не залишаючи надмірної липкості.<\/li>\n<\/ul> <p><strong>Переваги<\/strong><\/p>\n<ul>\n<li>Швидкий ефект: помітне зменшення больового синдрому вже через кілька хвилин після нанесення.<\/li>\n<li>Глибоке проникнення: активні компоненти досягають глибоких шарів тканин, працюючи безпосередньо з м’язами та зв’язками.<\/li>\n<li>Універсальність: допомагає як при хронічних захворюваннях суглобів, так і при гострих побутових або спортивних травмах.<\/li>\n<li>Міорелаксація: знімає м'язові спазми та напругу, повертаючи свободу рухів.<\/li>\n<li>Зручне пакування: туба 50 г забезпечує тривалий курс використання та зручна для зберігання в домашній аптечці.<\/li>\n<li>Висока якість: виробництво Туреччини за міжнародними фармацевтичними стандартами гарантує чистоту та ефективність складу.<\/li>\n<\/ul> <p><strong>Які проблеми вирішує<\/strong><\/p>\n<ul>\n<li>Болі в суглобах (артралгія), спричинені запальними або дегенеративними процесами.<\/li>\n<li>М'язові болі (міалгія) після інтенсивних тренувань або важкої фізичної праці.<\/li>\n<li>Розтягнення зв'язок, забиття та вивихи (як засіб для зняття болю та набряку).<\/li>\n<li>Біль у нижній частині спини (люмбаго) та ішіас.<\/li>\n<li>Скутість рухів у ранковий час або після тривалого нерухомого стану.<\/li>\n<li>Напруга в області шиї та плечей, викликана стресом або сидячою роботою.<\/li>\n<\/ul> <p><strong>Спосіб застосування<\/strong><\/p>\n<p>Крем Бенгей призначений виключно для зовнішнього застосування дорослим та дітям старше 12 років. Нанесіть невелику кількість крему на чисту суху шкіру над ділянкою болю. Злегка втирайте засіб масажними рухами до повного поглинання. Повторюйте процедуру 2–3 рази на добу залежно від інтенсивності симптомів.\nНе використовуйте засіб разом із зігрівальними пов’язками чи грілками. Уникайте потрапляння в очі, на слизові оболонки та на пошкоджену шкіру (відкриті рани). Після використання обов’язково ретельно вимийте руки з милом. Не застосовувати при наявності алергії на аспірин або саліцилати.<\/p> <p><strong>Характеристики:<\/strong><\/p>\n<ul>\n<li><strong>Бренд:<\/strong> Бенгей (Bengay)<\/li>\n<li><strong>Країна виробник:<\/strong> Туреччина<\/li>\n<li><strong>Тип продукту:<\/strong> Місцевий знеболювальний та протизапальний крем<\/li>\n<li><strong>Активні речовини:<\/strong> Метилсаліцилат, Ментол<\/li>\n<li><strong>Вага:<\/strong> 50 г<\/li>\n<li><strong>Форма випуску:<\/strong> Крем у тубі<\/li>\n<li><strong>Призначення:<\/strong> Зняття болю в суглобах та м'язах, лікування розтягнень<\/li>\n<\/ul>", "comment": "Топічний засіб від болю; доповнює суглобову категорію.", "badges": [], "promoType": "Стандарт", "slug": "мазь-від-болів-у-суглобах-бенгей-bengay"}, {"id": 449, "number": "6", "sku": "449", "name": "Кератиновий комплекс вітамінів Біоксин Bioxcin Keratin Complex Vitamin 60 таблеток 500 мг", "brand": "Bioxcin", "category": "Вітаміни для шкіри, волосся та суглобів", "subcategory": "Вітаміни для волосся та нігтів", "categoryPath": "Вітаміни для шкіри, волосся та суглобів > Вітаміни для волосся та нігтів", "sourceSection": "Лікування та догляд за волоссям", "price": 1199, "oldPrice": null, "discountPercent": null, "availability": "В наявності", "images": ["https://skinel.com.ua/content/images/31/36991377380884_+bb75784907.png", "https://skinel.com.ua/content/images/31/68903146997946_+1a778e70db.png"], "image": "https://skinel.com.ua/content/images/31/36991377380884_+bb75784907.png", "shortDescription": "Bioxcin Keratin Complex — це професійний нутріцевтичний комплекс, розроблений турецькою лабораторією Biota для глибокого відновлення структури волосся та зупинки його випадіння. На відміну від засобів зовнішнього догляду, ця дієтична добавка діє на рівні...", "descriptionHtml": "<p><strong>Bioxcin Keratin Complex<\/strong> — це професійний нутріцевтичний комплекс, розроблений турецькою лабораторією Biota для глибокого відновлення структури волосся та зупинки його випадіння. На відміну від засобів зовнішнього догляду, ця дієтична добавка діє на рівні волосяного фолікула, забезпечуючи організм критично важливими амінокислотами та мікроелементами. Це цільове рішення для тих, хто прагне повернути волоссю густоту, природний блиск та еластичність, діючи безпосередньо на причину проблеми — дефіцит поживних речовин.<\/p> <p><strong>Детальний аналіз активного складу<\/strong><\/p>\n<p>Формула продукту базується на синергії компонентів, що є фундаментальними для здоров’я ороговілих тканин (волосся, шкіри та нігтів):<\/p>\n<ul>\n<li><strong>Гідролізований кератин (500 мг):<\/strong> Основний структурний білок, з якого на 80% складається волосина. Гідролізована форма гарантує високу біодоступність — пептиди білка легко засвоюються та вбудовуються у структуру волосяного стрижня, заповнюючи порожнечі та усуваючи ламкість.<\/li>\n<li><strong>Біотин (Вітамін B7):<\/strong> Часто званий «вітаміном краси», він стимулює синтез власного колагену та кератину. Біотин зміцнює коріння, запобігає дифузному випадінню та покращує текстуру волосся, роблячи його більш слухняним.<\/li>\n<li><strong>Цинк (у формі сульфату):<\/strong> Мікроелемент, що відіграє ключову роль у процесі поділу клітин. Він регулює роботу сальних залоз, захищає фолікули від передчасного старіння та допомагає підтримувати здоров’я епідермісу голови.<\/li>\n<li><strong>Сірковмісні амінокислоти (L-цистеїн та L-метіонін):<\/strong> Сприяють формуванню міцних дисульфідних зв’язків, що відповідають за пружність та міцність волосини на розрив.<\/li>\n<li><strong>Рослинний комплекс (Екстракти редису, часнику та кореня кропиви):<\/strong> Природні джерела фітонцидів та вітамінів, які стимулюють мікроциркуляцію крові навколо цибулин, активуючи ріст «сплячого» волосся.<\/li>\n<\/ul> <p><strong>Які проблеми вирішує продукт<\/strong><\/p>\n<ul>\n<li><strong>Хронічне та сезонне випадіння:<\/strong> Зміцнює волосяну сумку та запобігає передчасному переходу волосся у фазу випадіння (телоген).<\/li>\n<li><strong>Пошкодження структури:<\/strong> Відновлює волосся після фарбування, термічного впливу та агресивної інсоляції.<\/li>\n<li><strong>Ламкість та розшарування нігтів:<\/strong> Кератин та цинк ефективно зміцнюють нігтьову пластину, роблячи її стійкою до пошкоджень.<\/li>\n<li><strong>Тьмяність та втрата об’єму:<\/strong> Насичує волосину зсередини, повертаючи їй щільність та здорове сяйво.<\/li>\n<\/ul> <p><strong>Переваги та особливості використання<\/strong><\/p>\n<p>Bioxcin Keratin Complex є ідеальним доповненням до щоденної рутини. Професійна формула не містить цукру, солі, крохмалю та штучних консервантів, що робить її безпечною для тривалих курсів. Продукт особливо рекомендований пацієнтам після трансплантації волосся для покращення приживлення графтів та потовщення нової волосяної лінії. Завдяки високій концентрації активних речовин, перші результати помітні вже через кілька тижнів регулярного прийому.<\/p> <p><strong>Спосіб застосування:<\/strong> Дорослим рекомендується приймати по 1 таблетці 1–2 рази на день під час їжі, запиваючи великою кількістю чистої води. Для досягнення стійкого терапевтичного ефекту рекомендований курс прийому становить 3 місяці.<\/p> <p><strong>Характеристики:<\/strong> Бренд: Bioxcin; Країна виробництва: Туреччина; Форма випуску: Таблетки; Кількість: 60 шт.<\/p>", "comment": "Добавка для волосся; поєднує health і trichology.", "badges": ["Набір"], "promoType": "Стандарт", "slug": "кератиновий-комплекс-вітамінів-біоксин-bioxcin-keratin-complex-vitamin-60-таблеток-500-мг"}, {"id": 458, "number": "7", "sku": "458", "name": "Мазь проти геморою та варикозного розширення вен Пайлекс Форте Pilex Forte Himalaya 30 г", "brand": "Himalaya", "category": "Здоров’я та комфорт", "subcategory": "Проктологія та венозний комфорт", "categoryPath": "Здоров’я та комфорт > Проктологія та венозний комфорт", "sourceSection": "HIMALAYA", "price": 154, "oldPrice": null, "discountPercent": null, "availability": "В наявності", "images": ["https://skinel.com.ua/content/images/32/38159227028487_+7ce1aa7986.png", "https://skinel.com.ua/content/images/32/38335273888741_+535582b38d.png"], "image": "https://skinel.com.ua/content/images/32/38159227028487_+7ce1aa7986.png", "shortDescription": "Мазь Пайлекс Форте (Pilex Forte) від індійського бренду Himalaya — це високоефективний трав'яний засіб, створений для боротьби з проявами геморою та варикозного розширення вен. На відміну від звичайних косметичних засобів, Пайлекс Форте є медикаментозною...", "descriptionHtml": "<p>Мазь Пайлекс Форте (Pilex Forte) від індійського бренду Himalaya — це високоефективний трав'яний засіб, створений для боротьби з проявами геморою та варикозного розширення вен. На відміну від звичайних косметичних засобів, Пайлекс Форте є медикаментозною формулою, яка діє системно на венозну сітку. Препарат допомагає значно покращити якість життя пацієнтів, усуваючи такі болісні симптоми, як свербіж, печіння, набряклість та кровотечі. Завдяки унікальному поєднанню цілющих екстрактів, мазь сприяє зміцненню стінок судин, зменшенню розміру гемороїдальних вузлів та прискоренню загоєння тріщин. Це надійний помічник як у гострій фазі захворювання, так і під час реабілітації.<\/p> <p><strong>Терапевтична дія та механізм впливу<\/strong><\/p>\n<p>Принцип дії мазі Pilex Forte базується на її здатності знижувати венозну гіперемію (переповнення кров’ю). Засіб ефективно тонізує вени, роблячи їх стінки більш еластичними та менш проникними. Це дозволяє зменшити набряк м'яких тканин та зняти тиск на нервові закінчення, що миттєво зменшує біль. Мазь має виражені в'яжучі та кровоостазуючі властивості, що критично важливо при наявності анальних тріщин або кровоточивих вузлів. Антисептична дія компонентів запобігає розвитку бактеріальних ускладнень та запалень. Регулярне застосування мазі стимулює природні процеси регенерації, допомагаючи слизовій оболонці та шкірі повернути цілісність та здоров'я.<\/p> <p><strong>Активні компоненти складу<\/strong><\/p>\n<ul>\n<li><strong>Ладжалу (Mimosa pudica):<\/strong> рослина, що має потужну в'яжучу дію. Вона допомагає звузити судини, зупинити капілярні кровотечі та прискорити епітелізацію пошкоджених зон.<\/li>\n<li><strong>Яшад Бхасма (Цинк):<\/strong> натуральний антисептик, який підсушує запалення, зменшує подразнення та створює захисну плівку, що запобігає контакту рани з бактеріями.<\/li>\n<li><strong>Брінгарадж (Eclipta alba):<\/strong> допомагає зняти почервоніння та набряк, має протизапальні та загоювальні властивості.<\/li>\n<li><strong>Ніргунді (Vitex negundo):<\/strong> відома своїми знеболювальними характеристиками. Вона швидко заспокоює подразнені тканини та знімає відчуття пульсації та важкості.<\/li>\n<li><strong>Камфора:<\/strong> забезпечує охолоджувальний ефект, який відволікає від болю та покращує місцевий обмін речовин у тканинах.<\/li>\n<\/ul> <p><strong>Кому доречно використовувати Пайлекс Форте<\/strong><\/p>\n<ul>\n<li>Людям із внутрішнім та зовнішнім гемороєм (усіх стадій).<\/li>\n<li>При наявності болючих анальних тріщин, що важко загоюються.<\/li>\n<li>Пацієнтам із варикозом нижніх кінцівок, що супроводжується набряками та судомами.<\/li>\n<li>При запальних процесах в аноректальній ділянці (проктит, періанальні дерматити).<\/li>\n<li>Для відновлення після проктологічних маніпуляцій та операцій.<\/li>\n<li>Людям із сидячою роботою для профілактики венозного застою в малом тазу.<\/li>\n<\/ul> <p><strong>Переваги мазі Pilex Forte Himalaya<\/strong><\/p>\n<ul>\n<li><strong>Природність:<\/strong> формула не містить синтетичних антибіотиків та агресивних хімічних сполук.<\/li>\n<li><strong>Безпека при тривалому прийомі:<\/strong> відсутність гормонів у складі робить препарат безпечним для регулярного використання.<\/li>\n<li><strong>Зручність:<\/strong> легка текстура мазі швидко вбирається, не залишаючи відчуття липкості, та забезпечує тривалу дію.<\/li>\n<li><strong>Потрійний ефект:<\/strong> знеболення, дезінфекція та активна регенерація в одному тюбику.<\/li>\n<\/ul> <p><strong>Спосіб застосування та рекомендації<\/strong><\/p>\n<p>Мазь слід наносити локально на уражені ділянки 1 або 2 рази на добу. Оптимально робити це після гігієнічного душу зранку та перед сном. Для внутрішнього введення використовуйте насадку-аплікатор, яка входить до комплекту. Після кожного використання аплікатор необхідно ретельно вимити гарячою водою з милом. Для пацієнтів із варикозом мазь наноситься тонким шаром на ноги від стопи до стегна без інтенсивного втирання. Максимальна ефективність досягається при одночасному прийомі таблеток Пайлекс. Під час лікування геморою рекомендується дотримуватися дієти, багатої на клітковину, для уникнення запорів.<\/p> <p><strong>Характеристики<\/strong><\/p>\n<p>Бренд: Himalaya Wellness. Країна виробництва: Індія. Кількість: 30 г. Форма випуску: Мазь.<\/p>", "comment": "Pilex Forte логічніше тримати на health-сайті, а не дерматологічному.", "badges": ["Допродаж"], "promoType": "Допродажі", "slug": "мазь-проти-геморою-та-варикозного-розширення-вен-пайлекс-форте-pilex-forte-himalaya-30-г"}, {"id": 177, "number": "8", "sku": "177", "name": "Фуціталмік, очні краплі 1% , туба 5 г", "brand": "Фуціталмік,", "category": "Здоров’я та комфорт", "subcategory": "Очні краплі та спеціальні засоби", "categoryPath": "Здоров’я та комфорт > Очні краплі та спеціальні засоби", "sourceSection": "Вся продукція", "price": 542, "oldPrice": null, "discountPercent": null, "availability": "В наявності", "images": ["https://skinel.com.ua/content/images/22/52803826706309_+208cf869bc.png", "https://skinel.com.ua/content/images/22/91612315139285_+63941e2766.png"], "image": "https://skinel.com.ua/content/images/22/52803826706309_+208cf869bc.png", "shortDescription": "Фуціталмік — це сучасний офтальмологічний антибіотик місцевої дії, представлений у формі в'язких очних крапель (очної суспензії). Унікальна в'язка структура препарату забезпечує тривалий контакт активної речовини зі слизовою оболонкою ока, що дозволяє досягти...", "descriptionHtml": "<p>Фуціталмік — це сучасний офтальмологічний антибіотик місцевої дії, представлений у формі в'язких очних крапель (очної суспензії). Унікальна в'язка структура препарату забезпечує тривалий контакт активної речовини зі слизовою оболонкою ока, що дозволяє досягти високої терапевтичної концентрації фузидової кислоти у слізній рідині. На відміну від звичайних водних розчинів, Фуціталмік не вимивається сльозою миттєво, що дає можливість скоротити кількість використань до двох разів на добу. Препарат діє прицільно на бактеріальні клітини, блокуючи синтез білка та зупиняючи розмноження збудників інфекції. Це надійний вибір для лікування поверхневих інфекцій очей, який поєднує в собі потужну антибактеріальну активність та високий профіль безпеки для пацієнтів різного віку.<\/p> <p><strong>Активні компоненти<\/strong><\/p>\n<ul>\n<li><strong>Фузидова кислота (10 мг/г):<\/strong> мікронізований антибіотик групи фузидинів. Ефективно знищує широкий спектр грампозитивних бактерій, зокрема стафілококів, які найчастіше викликають запалення очей.<\/li>\n<li><strong>Бензалконію хлорид:<\/strong> допоміжний антисептик та консервант.<\/li>\n<li><strong>Карбомер 974Р:<\/strong> забезпечує в'язкість засобу, перетворюючи краплі на тонку захисну плівку на поверхні рогівки.<\/li>\n<\/ul> <p><strong>Переваги продукту<\/strong><\/p>\n<ul>\n<li><strong>Пролонгована дія:<\/strong> завдяки в'язкій формі препарат діє довше, ніж стандартні краплі, що робить курс лікування комфортнішим.<\/li>\n<li><strong>Економічний режим дозування:<\/strong> застосовується лише двічі на добу (вранці та ввечері).<\/li>\n<li><strong>Висока ефективність:<\/strong> швидко усуває почервоніння, свербіж, гнійні виділення та відчуття «піску» в очах.<\/li>\n<li><strong>Точкова доставка:<\/strong> активна речовина проникає глибоко в тканини ока, де локалізується інфекція.<\/li>\n<\/ul> <p><strong>Які проблеми вирішує<\/strong><\/p>\n<ul>\n<li>Бактеріальні кон'юнктивіти різної етіології.<\/li>\n<li>Блефарити (запалення країв повік).<\/li>\n<li>Кератити та ячмінь (у складі комплексної терапії).<\/li>\n<li>Дакріоцистит (запалення слізного мішка).<\/li>\n<li>Профілактика інфекційних ускладнень після офтальмологічних операцій або травм.<\/li>\n<\/ul> <p><strong>Спосіб застосування<\/strong><\/p>\n<p>Препарат призначений виключно для місцевого застосування. Рекомендується вносити по 1 краплі суспензії в кон'юнктивальний мішок ураженого ока 2 рази на добу (вранці та ввечері). Перед процедурою ретельно вимийте руки. Відтягніть нижню повіку та капніть засіб, намагаючись не торкатися наконечником туби поверхні ока або шкіри, щоб уникнути забруднення ліків. Після нанесення закрийте очі на 1–2 хвилини. Стандартний курс лікування становить 7 днів. Якщо через 2–3 дні симптоми не зменшуються, зверніться до лікаря для корекції діагнозу.<\/p> <p><strong>Характеристики:<\/strong><\/p>\n<ul>\n<li><strong>Бренд:<\/strong> Fucithalmic (Abdi Ibrahim)<\/li>\n<li><strong>Країна виробник:<\/strong> Туреччина<\/li>\n<li><strong>Об'єм:<\/strong> 5 г<\/li>\n<li><strong>Тип продукту:<\/strong> В'язкі очні краплі (антибіотик)<\/li>\n<li><strong>Діюча речовина:<\/strong> Фузидова кислота 1%<\/li>\n<\/ul>", "comment": "Окрема вузька категорія; не дублює інші сайти.", "badges": [], "promoType": "Стандарт", "slug": "фуціталмік,-очні-краплі-1%-,-туба-5-г"}, {"id": 823, "number": "9", "sku": "823", "name": "Крем з глюкозаміном Glucosamin Creme для підтримки суглобів Німеччина 250 мл", "brand": "Glucosamin", "category": "Вітаміни для шкіри, волосся та суглобів", "subcategory": "Глюкозамін і хондроїтин", "categoryPath": "Вітаміни для шкіри, волосся та суглобів > Глюкозамін і хондроїтин", "sourceSection": "Здоров'я і харчування", "price": 397, "oldPrice": null, "discountPercent": null, "availability": "В наявності", "images": ["https://skinel.com.ua/content/images/28/32102568993375_+5850803afc.jpeg"], "image": "https://skinel.com.ua/content/images/28/32102568993375_+5850803afc.jpeg", "shortDescription": "Крем розроблений з використанням глюкозаміну, який є важливим компонентом для здоров'я суглобів та сухожиллів. Крем с глюкозамином Herbamedicus – это продукт, богатый натуральными питательными веществами, такими как экстракт арники, оливковое масло, масло ши...", "descriptionHtml": "<p><span>Крем розроблений з використанням глюкозаміну, який є важливим компонентом для здоров'я суглобів та сухожиллів.<\/span><\/p><p><span><span>Крем с глюкозамином Herbamedicus – это продукт, богатый натуральными питательными веществами, такими как экстракт арники, оливковое масло, масло ши и камфора. <\/span><span>Снимает боль в коленях и положительно влияет на состояние суставов.<\/span><\/span><br/><\/p><p><span><b>пок.аза.ння:<\/b><\/span><\/p><p><span>Підтримка суглобів: Glucosamin Creme Herbamedicus містить глюкозамін, який допомагає підтримувати здоров'я суглобів, зменшувати запалення та забезпечувати м'якість та гнучкість суглобів.<\/span><\/p><p><span>Зменшення болю: Крем може допомогти зменшити біль та дискомфорт, пов'язані з проблемами суглобів і м'язів.<\/span><\/p><ul><li><span>Покращення стану шкіри: Поміж іншими корисними інгредієнтами, Glucosamin Creme Herbamedicus містить олії та екстракти рослин, які сприяють здоров'ю і загоюванню шкіри.<\/span><\/li><li><span>Легка абсорбція: Крем легко вбир рії Quantum — це поєднання наукових розробок у галузі пептидів та сили цілющих рослин. Шампунь делікатно очищує шкіру голови, одночасно доставляючи активні нутрієнти безпосередньо до волосяних фолікулів. Формула пройшла численні дерматологічні випробування в італійському інституті Pavia, що підтверджує її високу ефективність та безпечність.<\/p> <p><strong>Ключові активні компоненти:<\/strong><\/p> <ul> <li><strong>Bio-Activ Peptides (Біоактивні пептиди):<\/strong> Комплекс із 18 амінокислот, що ідентичні пептидам людського волосся. Вони миттєво адсорбуються на пошкоджених ділянках кутикули, заповнюючи порожнечі. Це робить кожну волосину товстішою, еластичнішою та надає прикореневий об’єм без обтяження.<\/li> <li><strong>Biocomplex B11:<\/strong> Запатентований рослинний екстракт, до складу якого входять кропива, ромашка, деревій, хвощ та ріжкове дерево. Він зміцнює стінки капілярів, покращує мікроциркуляцію крові та ефективно бореться з дифузним випадінням волосся.<\/li> <li><strong>Флавоноїди та мінерали:<\/strong> Захищають волосся від окислювального стресу та негативного впливу навколишнього середовища. Мідь, цинк та вітаміни групи B живлять цибулини, стимулюючи ріст нового, здорового волосся.<\/li>\n<\/ul> <p><strong>Які проблеми вирішує Bioxcin Quantum:<\/strong><\/p> <ul> <li><strong>Інтенсивне випадіння волосся:<\/strong> Зміцнює коріння та подовжує життєвий цикл волосини.<\/li> <li><strong>Тонке та ослаблене волосся:<\/strong> Надає візуальної густоти та щільності завдяки пептидному відновленню.<\/li> <li><strong>Повільний ріст:<\/strong> Активація кровообігу сприяє швидшій регенерації волосяних цибулин.<\/li> <li><strong>Пошкодження структури:<\/strong> Відновлює волосся після фарбування, термічного впливу та впливу ультрафіолету.<\/li>\n<\/ul> <p><strong>Переваги використання набору:<\/strong><\/p> <p>Вибір набору 3 в 1 — це найбільш раціональний підхід до лікування волосся. Оскільки цикл оновлення волосяних фолікулів триває від 3 місяців, наявність трьох флаконів гарантує безперервність догляду. Шампунь є гіпоалергенним, має нейтральний pH та не містить парабенів чи агресивних сульфатів. Він дбайливо очищує шкіру голови, не викликаючи подразнень, і підходить для щоденного використання.<\/p> <p><strong>Спосіб застосування:<\/strong> Нанесіть невелику кількість шампуню на вологе волосся. Протягом 2–3 хвилин виконуйте м'який масаж шкіри голови кінчиками пальців — це необхідно для того, щоб активні пептиди проникли в структуру волосся та досягли коренів. Ретельно змийте теплою водою. Для досягнення максимального результату рекомендується регулярно використовувати шампунь протягом усього терапевтичного курсу.<\/p> <p><strong>Характеристики:<\/strong> Бренд: Bioxcin; Країна виробник: Туреччина; Категорія: Проти випадіння та для об’єму; Об’єм: Набір 3 шт (курс); Форма: Шампунь.<\/p>", "comment": "Bioxcin набір; медично-косметичний haircare для health-сайту.", "badges": ["3 за ціною 2", "Набір"], "promoType": "Акція", "slug": "шампунь-проти-випадіння-волосся-bioxcin-quantum-набір-3-шт-за-ціною-2"}, {"id": 1399, "number": "17", "sku": "1399", "name": "Atomy зубна щітка з ультратонкою щетиною набір 8 шт", "brand": "Atomy", "category": "Гігієна та щоденний догляд", "subcategory": "Оральна гігієна", "categoryPath": "Гігієна та щоденний догляд > Оральна гігієна", "sourceSection": "Здоров'я і харчування/Інші засоби для здоров'я", "price": 572, "oldPrice": null, "discountPercent": null, "availability": "В наявності", "images": ["https://skinel.com.ua/content/images/22/atomy-zubna-shchitka-z-ultratonkoiu-shchetynoiu-nabir-8-sht-83691710036718_+88e0277a2f.jpg", "https://skinel.com.ua/content/images/22/atomy-zubna-shchitka-z-ultratonkoiu-shchetynoiu-nabir-8-sht-53402275521629_+c4451145ff.jpg", "https://skinel.com.ua/content/images/22/atomy-zubna-shchitka-z-ultratonkoiu-shchetynoiu-nabir-8-sht-73780428029713_+7f0a2605da.jpg"], "image": "https://skinel.com.ua/content/images/22/atomy-zubna-shchitka-z-ultratonkoiu-shchetynoiu-nabir-8-sh           ['Спеціальні товари', 'Для товарів медичного, гігієнічного або індивідуального призначення можуть діяти окремі обмеження щодо повернення.']
        ]
      },
      privacy: {
        title: 'Політика конфіденційності',
        intro: 'Персональні дані використовуються лише для обробки замовлень, доставки та сервісної комунікації.',
        blocks: [
          ['Які дані збираються', 'ПІБ, телефон, email, місто, відділення або адреса доставки, коментар до замовлення.'],
          ['Для чого використовуються', 'Для підтвердження замовлення, відправлення, обробки оплат, підтримки клієнтів і покращення сервісу.'],
          ['Захист даних', 'Ми не передаємо дані третім особам для сторонньої реклами без вашої згоди.']
        ]
      }
    };

    function formatPrice(value) {
      return new Intl.NumberFormat('uk-UA').format(value || 0) + ' грн';
    }

    function cleanQuery(text) {
      return String(text || '').toLowerCase().trim();
    }

    function parseHash() {
      const hash = decodeURIComponent(window.location.hash || '#/');
      const clean = hash.replace(/^#\/?/, '');
      const parts = clean.split('/').filter(Boolean);

      if (!parts.length) return { name: 'home' };
      if (parts[0] === 'catalog') return { name: 'catalog' };
      if (parts[0] === 'category') return { name: 'catalog', category: parts.slice(1).join('/') };
      if (parts[0] === 'product') return { name: 'product', id: Number(parts[1]) };
      if (parts[0] === 'checkout') return { name: 'checkout' };
      if (parts[0] === 'info') return { name: 'info', pageKey: parts[1] || 'delivery' };
      return { name: 'home' };
    }

    function buildHash(view) {
      if (!view || view.name === 'home') return '#/';
      if (view.name === 'catalog' && view.category) return '#/category/' + encodeURIComponent(view.category);
      if (view.name === 'catalog') return '#/catalog';
      if (view.name === 'product') return '#/product/' + view.id;
      if (view.name === 'checkout') return '#/checkout';
      if (view.name === 'info') return '#/info/' + view.pageKey;
      return '#/';
    }

    function App() {
      const [view, setView] = useState(parseHash);
      const [search, setSearch] = useState('');
      const [cartOpen, setCartOpen] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);
      const [cart, setCart] = useState(() => {
        try { return JSON.parse(localStorage.getItem('zynova_cart_full')) || []; }
        catch { return []; }
      });

      useEffect(() => {
        const onHash = () => setView(parseHash());
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      useEffect(() => {
        localStorage.setItem('zynova_cart_full', JSON.stringify(cart));
      }, [cart]);

      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setMobileOpen(false);
      }, [view]);

      useEffect(() => {
        secureExternalLinks();
      }, [view, cartOpen]);

      const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);
      const cartTotal = cart.reduce((sum, item) => {
        const product = PRODUCTS.find(p => p.id === item.id);
        return sum + (product ? product.price * item.qty : 0);
      }, 0);

      function navigate(nextView) {
        window.location.hash = buildHash(nextView);
        setView(nextView);
      }

      function addToCart(product, qty = 1) {
        setCart(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + qty } : item);
          }
          return [...prev, { id: product.id, qty }];
        });
        setCartOpen(true);
      }

      function updateQty(id, qty) {
        if (qty <= 0) {
          setCart(prev => prev.filter(item => item.id !== id));
          return;
        }
        setCart(prev => prev.map(item => item.id === id ? { ...item, qty } : item));
      }

      function removeFromCart(id) {
        setCart(prev => prev.filter(item => item.id !== id));
      }

      return (
        <div className="min-h-screen flex flex-col">
          <Header
            navigate={navigate}
            search={search}
            setSearch={setSearch}
            cartCount={cartCount}
            openCart={() => setCartOpen(true)}
            mobileOpen={mobileOpen}
            setMobileOpen={setMobileOpen}
          />

          <main className="flex-1 pt-20">
            {view.name === 'home' && <Home navigate={navigate} addToCart={addToCart} />}
            {view.name === 'catalog' && <Catalog navigate={navigate} addToCart={addToCart} search={search} setSearch={setSearch} initialCategory={view.category} />}
            {view.name === 'product' && <ProductPage product={PRODUCTS.find(p => p.id === view.id)} navigate={navigate} addToCart={addToCart} />}
            {view.name === 'checkout' && (
              <Checkout
                cart={cart}
                cartTotal={cartTotal}
                navigate={navigate}
                updateQty={updateQty}
                removeFromCart={removeFromCart}
                clearCart={() => setCart([])}
              />
            )}
            {view.name === 'info' && <InfoPage pageKey={view.pageKey} navigate={navigate} />}
          </main>

          <Footer navigate={navigate} />

          {cartOpen && (
            <CartDrawer
              cart={cart}
              total={cartTotal}
              close={() => setCartOpen(false)}
              updateQty={updateQty}
              removeFromCart={removeFromCart}
              navigate={(v) => { setCartOpen(false); navigate(v); }}
            />
          )}
        </div>
      );
    }

    function Header({ navigate, search, setSearch, cartCount, openCart, mobileOpen, setMobileOpen }) {

            <nav className="hidden lg:flex items-center gap-5 xl:gap-7 text-[13px] xl:text-sm font-medium text-brand-400">

          <section className="max-w-7xl mx-auto px-4 pb-20">

      return (
        <section className="max-w-7xl mx-auto px-4 pb-16">
          <div className="flex items-end justify-between gap-4 mb-7">
            <div>
              <p className="text-xs uppercase tracking-[.28em] text-brand-400 font-semibold">zynova selection</p>

            <button onClick={() => navigate({ name: 'catalog' })} className="hidden sm:block text-sm font-medium text-brand-500 hover:text-brand-900">

          </div>

    function Catalog({ navigate, addToCart, search, setSearch, initialCategory }) {
      const [category, setCategory] = useState(initialCategory || 'Усі');
      const [subcategory, setSubcategory] = useState('Усі');
      const [priceRange, setPriceRange] = useState('Усі');
      const [promo, setPromo] = useState('Усі');
      const [availability, setAvailability] = useState('Усі');
      const [sort, setSort] = useState('default');

      useEffect(() => {
        setCategory(initialCategory || 'Усі');
        setSubcategory('Усі');
      }, [initialCategory]);

      const subcategories = useMemo(() => {
        const source = category === 'Усі' ? PRODUCTS : PRODUCTS.filter(p => p.category === category);
        return ['Усі', ...Array.from(new Set(source.map(p => p.subcategory).filter(Boolean)))];
      }, [category]);

      const filtered = useMemo(() => {
        const q = cleanQuery(search);
        let list = PRODUCTS.filter(product => {
          const matchCategory = category === 'Усі' || product.category === category;
          const matchSubcategory = subcategory === 'Усі' || product.subcategory === subcategory;
          const matchAvailability = availability === 'Усі' || product.availability === availability;
          const matchPromo = promo === 'Усі' || product.promoType === promo || product.badges.includes(promo);
          const searchable = cleanQuery([
            product.name,
            product.brand,
            product.category,
            product.subcategory,
            product.shortDescription,
            product.categoryPath,
            product.sourceSection
          ].join(' '));
          const matchSearch = !q || searchable.includes(q);

          let matchPrice = true;
          if (priceRange === 'До 500 грн') matchPrice = product.price <= 500;
          if (priceRange === '500–1000 грн') matchPrice = product.price > 500 && product.price <= 1000;
          if (priceRange === '1000–2000 грн') matchPrice = product.price > 1000 && product.price <= 2000;
          if (priceRange === 'Від 2000 грн') matchPrice = product.price > 2000;

          return matchCategory && matchSubcategory && matchAvailability && matchPromo && matchSearch && matchPrice;
        });

        if (sort === 'priceAsc') list = [...list].sort((a, b) => a.price - b.price);
        if (sort === 'priceDesc') list = [...list].sort((a, b) => b.price - a.price);
        if (sort === 'name') list = [...list].sort((a, b) => a.name.localeCompare(b.name, 'uk'));
        if (sort === 'promo') list = [...list].sort((a, b) => Number(b.promoType !== 'Стандарт') - Number(a.promoType !== 'Стандарт'));

        return list;
      }, [category, subcategory, availability, promo, search, priceRange, sort]);

      return (

          <div className="soft-card rounded-[2rem] p-6 md:p-8 mb-7">
            <p className="text-xs uppercase tracking-[.3em] text-brand-400 font-semibold">каталог zynova</p>
            <div className="mt-3 lg:flex items-end justify-between gap-8">
              <div>
                <h1 className="text-3xl md:text-5xl font-light tracking-tight">

                </p>
              </div>
              <div className="mt-5 lg:mt-0 min-w-full lg:min-w-[340px] flex items-center rounded-full border border-brand-100 bg-white px-4 py-3">
                <SearchIcon className="w-4 h-4 text-brand-400 mr-2" />
                <input
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="Назва, бренд, категорія"
                  className="bg-transparent outline-none w-full text-sm"

                {['Усі', ...MAIN_CATEGORIES].map(item => (
                  <FilterPill key={item} active={category === item} onClick={() => { setCategory(item); setSubcategory('Усі'); }}>
                    {item}
                  </FilterPill>
                ))}
              </FilterBlock>

              <FilterBlock title="Підкатегорія">
                <select value={subcategory} onChange={e => setSubcategory(e.target.value)} className="w-full rounded-xl border border-brand-100 bg-white px-4 py-3 text-sm outline-none">
                  {subcategories.map(item => <option key={item} value={item}>{item}</option>)}

              </FilterBlock>

              <FilterBlock title="Ціна">
                {['Усі', 'До 500 грн', '500–1000 грн', '1000–2000 грн', 'Від 2000 грн'].map(item => (
                  <FilterPill key={item} active={priceRange === item} onClick={() => setPriceRange(item)}>{item}</FilterPill>
                ))}
              </FilterBlock>

              <FilterBlock title="Акції та формати">
                {['Усі', 'Акція', 'Набори', 'Допродажі'].map(item => (
                  <FilterPill key={item} active={promo === item} onClick={() => setPromo(item)}>{item}</FilterPill>

              <FilterBlock title="Наявність">
                {['Усі', ...Array.from(new Set(PRODUCTS.map(p => p.availability)))].map(item => (
                  <FilterPill key={item} active={availability === item} onClick={() => setAvailability(item)}>{item}</FilterPill>
                ))}
              </FilterBlock>

              <button
                onClick={() => {
                  setCategory('Усі'); setSubcategory('Усі'); setPriceRange('Усі'); setPromo('Усі'); setAvailability('Усі'); setSort('default'); setSearch('');

              >
                Скинути фільтри

            </aside>

            <div>
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <p className="text-sm text-brand-400">Знайдено: <span className="text-brand-900 font-semibold">{filtered.length}</span></p>
                <select value={sort} onChange={e => setSort(e.target.value)} className="rounded-xl border border-brand-100 bg-white px-4 py-3 text-sm outline-none">
                  <option value="default">Сортування за замовчуванням</option>
                  <option value="priceAsc">Ціна: від нижчої</option>
                  <option value="priceDesc">Ціна: від вищої</option>
                  <option value="name">Назва: А–Я</option>

              {filtered.length ? (

              ) : (
                <div className="soft-card rounded-[2rem] p-10 text-center">
                  <h2 className="text-2xl font-semibold">Товарів не знайдено</h2>
                  <p className="mt-3 text-brand-400">Змініть фільтр або пошуковий запит.</p>
                </div>
              )}
            </div>
          </div>
        </section>
      );
    }

    function FilterBlock({ title, children }) {
      return (
        <div className="mb-6">
          <h3 className="text-xs uppercase tracking-[.22em] text-brand-400 font-semibold mb-3">{title}</h3>

    function FilterPill({ active, onClick, children }) {
      return (
        <button
          onClick={onClick}
          className={`text-left rounded-xl px-4 py-3 text-sm transition ${active ? 'bg-brand-900 text-white' : 'bg-white border border-brand-100 text-brand-700 hover:border-brand-300'}`}
        >
          {children}
        </button>
      );
    }

    function ProductCard({ product, navigate, addToCart }) {
      return (
        <article className="group flex flex-col soft-card rounded-2xl overflow-hidden hover:-translate-y-1 transition">
          <button onClick={() => navigate({ name: 'product', id: product.id })} className="text-left">
            <div className="relative overflow-hidden bg-brand-100">
              <ProductImage product={product} className="aspect-[4/5]" />
              <div className="absolute left-4 top-4 flex flex-wrap gap-2">
                {product.discountPercent && <span className="bg-brand-900 text-white text-xs font-semibold rounded-full px-3 py-1">−{product.discountPercent}%</span>}
                {product.badges.slice(0, 2).map(badge => (
                  <span key={badge} className="bg-white/92 backdrop-blur text-brand-800 text-xs font-medium rounded-full px-3 py-1">{badge}</span>
                ))}
              </div>
            </div>
            <div className="p-5">
              <p className="text-xs uppercase tracking-[.18em] text-brand-400">{product.subcategory}</p>
              <h3 className="mt-2 text-base font-semibold leading-snug clamp-2 min-h-[44px]">{product.name}</h3>
              <p className="mt-3 text-sm text-brand-400 leading-6 clamp-3">{product.shortDescription}</p>
              <div className="mt-4 flex items-center gap-2">
                <span className="font-semibold text-brand-900">{formatPrice(product.price)}</span>
                {product.oldPrice && <span className="text-sm text-brand-400 line-through">{formatPrice(product.oldPrice)}</span>}
              </div>
              <p className="mt-2 text-xs text-sageDark">{product.availability}</p>
            </div>
          </button>
          <div className="p-5 pt-0 mt-auto grid grid-cols-[1fr_auto] gap-2">
            <button onClick={() => addToCart(product)} className="bg-brand-900 text-white rounded py-3 text-sm font-medium hover:bg-brand-800 transition">
              В кошик
            </button>
            <button onClick={() => navigate({ name: 'product', id: product.id })} className="border border-brand-100 rounded px-4 py-3 text-sm font-medium hover:border-brand-300 transition">
              Деталі
            </button>
          </div>
        </article>
      );
    }

    function ProductImage({ product, className = '' }) {
      const [error, setError] = useState(false);
      const src = product.image || (product.images && product.images[0]);
      if (!src || error) {
        return (
          <div className={`w-full ${className} bg-gradient-to-br from-brand-100 to-sand flex items-center justify-center p-6`}>
            <div className="text-center">
              <div className="brand-logo text-xl">zy<strong>nova</strong></div>
              <p className="mt-3 text-xs text-brand-400">{product.brand || "zynova"}</p>
            </div>
          </div>
        );
      }
      return (
        <div className={`w-full ${className} bg-white overflow-hidden flex items-center justify-center p-4`}>
          <img
            src={src}
            alt={product.name}
            loading="lazy"
            decoding="async"
            referrerPolicy="no-referrer"
            data-nosnippet="true"
            onError={() => setError(true)}
            className="w-full h-full object-contain transition-transform duration-700 group-hover:scale-105"
          />
        </div>
      );
    }

    function ProductPage({ product, navigate, addToCart }) {
      const [activeImage, setActiveImage] = useState(0);
      const [qty, setQty] = useState(1);

      if (!product) {
        return (
          <section className="max-w-4xl mx-auto px-4 py-20 text-center">
            <h1 className="text-3xl font-semibold">Товар не знайдено</h1>
            <button onClick={() => navigate({ name: 'home' })} className="mt-6 bg-brand-900 text-white rounded px-7 py-3">На головну</button>
          </section>
        );
      }

      const currentImage = product.images && product.images.length ? product.images[activeImage] : product.image;
      const similar = PRODUCTS.filter(p => p.id !== product.id && (p.subcategory === product.subcategory || p.category === product.category)).slice(0, 4);

      return (
        <section className="max-w-7xl mx-auto px-4 py-10 pb-20 fade-in">
          <button onClick={() => navigate({ name: 'catalog', category: product.category })} className="text-sm font-medium text-brand-400 hover:text-brand-900 mb-6">
            ← Назад до {product.category}
          </button>

          <div className="grid lg:grid-cols-[1fr_.95fr] gap-8">
            <div className="soft-card rounded-[2rem] p-4">
              <div className="rounded-[1.4rem] overflow-hidden bg-brand-100">
                <ImageDisplay src={currentImage} alt={product.name} product={product} className="aspect-square" />
              </div>
              {product.images && product.images.length > 1 && (
                <div className="grid grid-cols-4 gap-3 mt-4">
                  {product.images.slice(0, 8).map((img, index) => (
                    <button key={img} onClick={() => setActiveImage(index)} className={`rounded-xl overflow-hidden border ${activeImage === index ? 'border-brand-900' : 'border-brand-100'}`}>
                      <ImageDisplay src={img} alt={product.name} product={product} className="aspect-square" />
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div className="soft-card rounded-[2rem] p-6 md:p-9">
              <div className="flex flex-wrap gap-2">
                {product.badges.map(badge => <span key={badge} className="bg-brand-100 rounded-full px-3 py-1 text-xs font-medium text-brand-700">{badge}</span>)}
                <span className="bg-white border border-brand-100 rounded-full px-3 py-1 text-xs font-medium text-sageDark">{product.availability}</span>
              </div>

              <p className="mt-6 text-xs uppercase tracking-[.25em] text-brand-400">{product.category} / {product.subcategory}</p>
              <h1 className="mt-3 text-3xl md:text-5xl font-light leading-tight tracking-tight">{product.name}</h1>
              <p className="mt-5 text-brand-500 leading-8">{product.shortDescription}</p>

              <div className="mt-7 flex items-center gap-3">
                <span className="text-3xl font-semibold">{formatPrice(product.price)}</span>
                {product.oldPrice && <span className="text-xl text-brand-400 line-through">{formatPrice(product.oldPrice)}</span>}
              </div>

              <div className="mt-8 flex flex-col sm:flex-row gap-3">
                <div className="flex w-fit items-center rounded border border-brand-100 bg-white">
                  <button onClick={() => setQty(Math.max(1, qty - 1))} className="px-5 py-3">−</button>
                  <span className="min-w-10 text-center font-medium">{qty}</span>
                  <button onClick={() => setQty(qty + 1)} className="px-5 py-3">+</button>
                </div>
                <button onClick={() => addToCart(product, qty)} className="bg-brand-900 text-white rounded px-8 py-4 text-sm font-medium hover:bg-brand-800 transition">
                  Додати в кошик
                </button>
              </div>

              <div className="grid sm:grid-cols-2 gap-3 mt-8 text-sm">
                <InfoMini label="Артикул" value={product.sku} />
                <InfoMini label="Бренд" value={product.brand} />
                <InfoMini label="Основний розділ" value={product.category} />
                <InfoMini label="Підкатегорія" value={product.subcategory} />
              </div>

              <div className="mt-8 rounded-2xl bg-brand-50 border border-brand-100 p-5 text-sm leading-7 text-brand-500">
                Перед застосуванням товарів із медичним, спеціальним або нутріцевтичним призначенням ознайомтеся з інструкцією виробника. Інформація на сайті не замінює консультацію лікаря.
              </div>
            </div>
          </div>

          <div className="mt-10 soft-card rounded-[2rem] p-6 md:p-9">
            <h2 className="text-2xl font-semibold mb-6">Опис товару</h2>
            <div className="description-content" dangerouslySetInnerHTML={{ __html: sanitizeDescriptionHtml(product.descriptionHtml) }} />
          </div>

          {similar.length > 0 && (
            <section className="mt-14">
              <h2 className="text-2xl md:text-3xl font-semibold mb-7">Схожі товари</h2>
              <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                {similar.map(item => <ProductCard key={item.id} product={item} navigate={navigate} addToCart={addToCart} />)}
              </div>
            </section>
          )}
        </section>
      );
    }

    function ImageDisplay({ src, alt, product, className }) {
      const [error, setError] = useState(false);
      if (!src || error) return <ProductImage product={product} className={className} />;
      return (
        <div className={`w-full ${className} bg-white overflow-hidden flex items-center justify-center p-4`}>
          <img src={src} alt={alt} onError={() => setError(true)} className="w-full h-full object-contain" loading="lazy" decoding="async" referrerPolicy="no-referrer" data-nosnippet="true" />
        </div>
      );
    }

    function InfoMini({ label, value }) {
      return (
        <div className="rounded-xl bg-white border border-brand-100 p-4">
          <p className="text-xs uppercase tracking-[.18em] text-brand-400">{label}</p>
          <p className="mt-2 font-medium text-brand-800">{value || '—'}</p>
        </div>
      );
    }

    function CartDrawer({ cart, total, close, updateQty, removeFromCart, navigate }) {
      const items = cart.map(item => ({ ...item, product: PRODUCTS.find(p => p.id === item.id) })).filter(item => item.product);

      return (
        <div className="fixed inset-0 z-50">
          <button onClick={close} className="absolute inset-0 bg-black/20 backdrop-blur-sm fade-in" aria-label="Закрити кошик"></button>
          <aside className="slide-in absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col">
            <div className="p-6 flex items-center justify-between border-b border-brand-100">
              <div>
                <h2 className="text-xl font-semibold">Ваш кошик</h2>
                <p className="text-sm text-brand-400">{items.length ? `${items.reduce((s, i) => s + i.qty, 0)} товарів` : 'Кошик порожній'}</p>
              </div>
              <button onClick={close} className="p-2 hover:bg-brand-100 rounded-full transition">✕</button>
            </div>

            <div className="flex-1 overflow-y-auto p-6 space-y-5 hide-scroll">
              {items.length === 0 ? (
                <div className="text-center py-12">
                  <p className="text-brand-400">Додайте товари для оформлення замовлення.</p>
                  <button onClick={() => navigate({ name: 'catalog' })} className="mt-5 bg-brand-900 text-white rounded px-6 py-3 text-sm font-medium">Перейти до товарів</button>
                </div>
              ) : items.map(({ product, qty }) => (
                <div key={product.id} className="flex gap-4">
                  <button onClick={() => navigate({ name: 'product', id: product.id })} className="w-20 shrink-0 rounded overflow-hidden bg-brand-100">
                    <ProductImage product={product} className="aspect-[4/5]" />
                  </button>
                  <div className="flex-1">
                    <div className="flex gap-3 justify-between">
                      <div>
                        <h3 className="text-sm font-medium leading-snug">{product.name}</h3>
                        <p className="text-xs text-brand-400 mt-1">{formatPrice(product.price)}</p>
                      </div>
                      <button onClick={() => removeFromCart(product.id)} className="text-brand-400 hover:text-brand-900">✕</button>
                    </div>
                    <div className="flex items-center justify-between mt-3">
                      <div className="flex items-center border border-brand-100 rounded">
                        <button onClick={() => updateQty(product.id, qty - 1)} className="px-3 py-1 text-brand-400">−</button>
                        <span className="w-8 text-center text-sm">{qty}</span>
                        <button onClick={() => updateQty(product.id, qty + 1)} className="px-3 py-1 text-brand-400">+</button>
                      </div>
                      <span className="font-medium">{formatPrice(product.price * qty)}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <div className="p-6 border-t border-brand-100 bg-brand-50">
              <div className="flex justify-between mb-4 text-lg font-semibold">
                <span>Разом</span>
                <span>{formatPrice(total)}</span>
              </div>
              <button
                disabled={!items.length}
                onClick={() => navigate({ name: 'checkout' })}
                className="w-full bg-brand-900 text-white py-4 rounded text-sm font-medium hover:bg-brand-800 transition disabled:bg-brand-300 disabled:cursor-not-allowed"
              >
                Оформити замовлення
              </button>
            </div>
          </aside>
        </div>
      );
    }

    function Checkout({ cart, cartTotal, navigate, updateQty, removeFromCart, clearCart }) {
      const [submitted, setSubmitted] = useState(false);
      const [form, setForm] = useState({
        name: '',
        phone: '',
        email: '',
        delivery: 'Нова пошта',
        payment: 'Оплата при отриманні',
        city: '',
        comment: ''
      });

      const items = cart.map(item => ({ ...item, product: PRODUCTS.find(p => p.id === item.id) })).filter(item => item.product);

      function change(e) {
        setForm(prev => ({ ...prev, [e.target.name]: e.target.value }));
      }

      function submit(e) {
        e.preventDefault();
        if (!items.length) return;
        setSubmitted(true);
        clearCart();
      }

      if (submitted) {
        return (
          <section className="max-w-3xl mx-auto px-4 py-16 text-center fade-in">
            <div className="soft-card rounded-[2rem] p-8 md:p-12">
              <p className="text-xs uppercase tracking-[.3em] text-brand-400 font-semibold">замовлення прийнято</p>
              <h1 className="mt-4 text-3xl md:text-5xl font-light">Дякуємо, {form.name || 'ваше замовлення оформлено'}.</h1>
              <p className="mt-5 text-brand-400 leading-8">Ваше замовлення сформовано. Менеджер зв’яжеться з вами для підтвердження деталей, наявності товарів, оплати та доставки.</p>
              <button onClick={() => navigate({ name: 'home' })} className="mt-8 bg-brand-900 text-white rounded px-8 py-4 text-sm font-medium">На головну</button>
            </div>
          </section>
        );
      }

      return (
        <section className="max-w-7xl mx-auto px-4 py-10 pb-20 fade-in">
          <button onClick={() => navigate({ name: 'catalog' })} className="text-sm font-medium text-brand-400 hover:text-brand-900 mb-6">← Продовжити покупки</button>

          <div className="grid lg:grid-cols-[1fr_420px] gap-8">
            <form onSubmit={submit} className="soft-card rounded-[2rem] p-6 md:p-9">
              <p className="text-xs uppercase tracking-[.3em] text-brand-400 font-semibold">checkout</p>
              <h1 className="mt-3 text-3xl md:text-5xl font-light">Оформлення замовлення</h1>

              <div className="grid gap-5 mt-8">
                <TextInput label="ПІБ" name="name" value={form.name} onChange={change} required placeholder="Ваше ім’я та прізвище" />
                <div className="grid md:grid-cols-2 gap-5">
                  <TextInput label="Телефон" name="phone" value={form.phone} onChange={change} required placeholder="+380..." />
                  <TextInput label="Email" name="email" type="email" value={form.email} onChange={change} required placeholder="email@example.com" />
                </div>
                <TextInput label="Місто / відділення" name="city" value={form.city} onChange={change} placeholder="Наприклад: Київ, НП №12" />
                <div className="grid md:grid-cols-2 gap-5">
                  <SelectInput label="Доставка" name="delivery" value={form.delivery} onChange={change} options={['Нова пошта', 'Кур’єрська доставка', 'Самовивіз']} />
                  <SelectInput label="Оплата" name="payment" value={form.payment} onChange={change} options={['Оплата при отриманні', 'Онлайн-оплата карткою', 'Банківський переказ']} />
                </div>
                <label>
                  <span className="block text-sm font-medium mb-2">Коментар</span>
                  <textarea name="comment" value={form.comment} onChange={change} rows="4" className="w-full rounded-xl border border-brand-100 bg-white px-4 py-3 outline-none focus:border-brand-300" placeholder="Додаткова інформація до замовлення"></textarea>
                </label>
              </div>

              <button disabled={!items.length} className="mt-8 w-full bg-brand-900 text-white rounded py-4 text-sm font-medium hover:bg-brand-800 transition disabled:bg-brand-300">
                Підтвердити замовлення
              </button>
            </form>

            <aside className="soft-card rounded-[2rem] p-5 h-fit lg:sticky lg:top-28">
              <h2 className="text-xl font-semibold">Склад замовлення</h2>
              <div className="mt-5 space-y-4">
                {items.length ? items.map(({ product, qty }) => (
                  <div key={product.id} className="bg-white border border-brand-100 rounded-xl p-4">
                    <div className="flex justify-between gap-3">
                      <div>
                        <h3 className="text-sm font-medium leading-snug">{product.name}</h3>
                        <p className="text-xs text-brand-400 mt-1">{formatPrice(product.price)} × {qty}</p>
                      </div>
                      <button onClick={() => removeFromCart(product.id)} type="button" className="text-brand-400">✕</button>
                    </div>
                    <div className="flex items-center mt-3 border border-brand-100 rounded w-fit">
                      <button onClick={() => updateQty(product.id, qty - 1)} type="button" className="px-3 py-1 text-brand-400">−</button>
                      <span className="w-8 text-center text-sm">{qty}</span>
                      <button onClick={() => updateQty(product.id, qty + 1)} type="button" className="px-3 py-1 text-brand-400">+</button>
                    </div>
                  </div>
                )) : <p className="text-brand-400">Кошик порожній.</p>}
              </div>

              <div className="mt-6 pt-5 border-t border-brand-100 flex justify-between text-lg font-semibold">
                <span>Разом</span>
                <span>{formatPrice(cartTotal)}</span>
              </div>
            </aside>
          </div>
        </section>
      );
    }

    function TextInput({ label, ...props }) {
      return (
        <label>
          <span className="block text-sm font-medium mb-2">{label}</span>
          <input {...props} className="w-full rounded-xl border border-brand-100 bg-white px-4 py-3 outline-none focus:border-brand-300" />
        </label>
      );
    }

    function SelectInput({ label, options, ...props }) {
      return (
        <label>
          <span className="block text-sm font-medium mb-2">{label}</span>
          <select {...props} className="w-full rounded-xl border border-brand-100 bg-white px-4 py-3 outline-none focus:border-brand-300">
            {options.map(option => <option key={option} value={option}>{option}</option>)}
          </select>
        </label>
      );
    }

    function InfoPage({ pageKey, navigate }) {
      const page = INFO_PAGES[pageKey] || INFO_PAGES.delivery;
      return (
        <section className="max-w-5xl mx-auto px-4 py-12 pb-20 fade-in">
          <button onClick={() => navigate({ name: 'home' })} className="text-sm font-medium text-brand-400 hover:text-brand-900 mb-6">← На головну</button>
          <div className="soft-card rounded-[2rem] p-8 md:p-12">
            <p className="text-xs uppercase tracking-[.3em] text-brand-400 font-semibold">інформація</p>
            <h1 className="mt-4 text-3xl md:text-5xl font-light">{page.title}</h1>
            <p className="mt-5 text-brand-400 leading-8 max-w-3xl">{page.intro}</p>
            <div className="grid gap-4 mt-8">
              {page.blocks.map(([title, text]) => (
                <div key={title} className="bg-white border border-brand-100 rounded-2xl p-6">
                  <h2 className="font-semibold text-lg">{title}</h2>
                  <p className="mt-3 text-brand-400 leading-7">{text}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Footer({ navigate }) {
      return (
        <footer className="bg-brand-900 text-brand-400 mt-12" id="footer">
          <div className="max-w-7xl mx-auto px-4 py-12 grid md:grid-cols-4 gap-8">
            <div className="md:col-span-2">
              <button onClick={() => navigate({ name: 'home' })} className="brand-logo text-white text-2xl">
                zy<strong>nova</strong>
              </button>
              <p className="mt-4 max-w-md text-sm leading-7">
                Zynova — онлайн-магазин товарів для здоров’я, краси, щоденного догляду та wellness-підтримки.
              </p>
            </div>
            <div>
              <h3 className="text-white font-medium mb-4">Категорії</h3>
              <div className="grid gap-2 text-sm">
                {MAIN_CATEGORIES.map(category => (
                  <button key={category} onClick={() => navigate({ name: 'catalog', category })} className="text-left hover:text-white transition">{category}</button>
                ))}
              </div>
            </div>
            <div>
              <h3 className="text-white font-medium mb-4">Інформація</h3>
              <div className="grid gap-2 text-sm">
                <button onClick={() => navigate({ name: 'info', pageKey: 'delivery' })} className="text-left hover:text-white transition">Оплата і доставка</button>
                <button onClick={() => navigate({ name: 'info', pageKey: 'returns' })} className="text-left hover:text-white transition">Обмін і повернення</button>
                <button onClick={() => navigate({ name: 'info', pageKey: 'privacy' })} className="text-left hover:text-white transition">Політика конфіденційності</button>
              </div>
              <p className="mt-5 text-sm">hello@zynova.com.ua</p>
            </div>
          </div>
          <div className="border-t border-brand-800 py-5 text-center text-sm">
            © 2026 zynova.com.ua. Всі права захищено.
          </div>
        </footer>
      );
    }

    function SearchIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-3.2-3.2"></path>
        </svg>
      );
    }

    function BagIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
          <path d="M6.5 8.5h11l1 12h-13l1-12Z"></path>
          <path d="M9 8.5V7a3 3 0 0 1 6 0v1.5"></path>
        </svg>
      );
    }

    function MenuIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
          <path d="M4 7h16M4 12h16M4 17h16"></path>
        </svg>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
