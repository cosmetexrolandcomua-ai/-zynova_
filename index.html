      document.title = title;
      let meta = document.querySelector('meta[name="description"]');
      if (!meta) {
        meta = document.createElement('meta');
        meta.setAttribute('name', 'description');
        document.head.appendChild(meta);

      meta.setAttribute('content', description.slice(0, 320));
    }

    function parseHash() {
      const hash = decodeURIComponent(window.location.hash || '#/');
      const clean = hash.replace(/^#\/?/, '');
      const parts = clean.split('/').filter(Boolean);

      if (!parts.length) return { name: 'home' };
      if (parts[0] === 'catalog') return { name: 'catalog' };
      if (parts[0] === 'category') return { name: 'catalog', category: parts.slice(1).join('/') };
      if (parts[0] === 'product') return { name: 'product', id: Number(parts[1]) };
      if (parts[0] === 'checkout') return { name: 'checkout' };
      if (parts[0] === 'info') return { name: 'info', pageKey: parts[1] || 'delivery' };
      return { name: 'home' };
    }

    function buildHash(view) {
      if (!view || view.name === 'home') return '#/';
      if (view.name === 'catalog' && view.category) return '#/category/' + encodeURIComponent(view.category);
      if (view.name === 'catalog') return '#/catalog';
      if (view.name === 'product') return '#/product/' + view.id;
      if (view.name === 'checkout') return '#/checkout';
      if (view.name === 'info') return '#/info/' + view.pageKey;
      return '#/';
    }

      const [cart, setCart] = useState(() => {
        try { return JSON.parse(localStorage.getItem('zynova_cart_full')) || []; }
        catch { return []; }
      });

      useEffect(() => {
        const onHash = () => setView(parseHash());
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      useEffect(() => {
        localStorage.setItem('zynova_cart_full', JSON.stringify(cart));
      }, [cart]);

      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setMobileOpen(false);

      const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);
      const cartTotal = cart.reduce((sum, item) => {
        const product = PRODUCTS.find(p => p.id === item.id);
        return sum + (product ? product.price * item.qty : 0);
      }, 0);

      function navigate(nextView) {
        window.location.hash = buildHash(nextView);
        setView(nextView);
      }

      function addToCart(product, qty = 1) {
        setCart(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + qty } : item);
          }
          return [...prev, { id: product.id, qty }];
        });
        setCartOpen(true);
      }

      function updateQty(id, qty) {
        if (qty <= 0) {
          setCart(prev => prev.filter(item => item.id !== id));
          return;
        }
        setCart(prev => prev.map(item => item.id === id ? { ...item, qty } : item));

        setCart(prev => prev.filter(item => item.id !== id));

    function Catalog({ navigate, addToCart, search, setSearch, initialCategory }) {
      const [category, setCategory] = useState(initialCategory || 'Усі');
      const [subcategory, setSubcategory] = useState('Усі');
      const [priceRange, setPriceRange] = useState('Усі');
      const [promo, setPromo] = useState('Усі');
      const [availability, setAvailability] = useState('Усі');
      const [sort, setSort] = useState('default');

      useEffect(() => {
        setCategory(initialCategory || 'Усі');
        setSubcategory('Усі');
      }, [initialCategory]);

      const subcategories = useMemo(() => {
        const source = category === 'Усі' ? PRODUCTS : PRODUCTS.filter(p => p.category === category);
        return ['Усі', ...Array.from(new Set(source.map(p => p.subcategory).filter(Boolean)))];
      }, [category]);

      const filtered = useMemo(() => {
        const q = cleanQuery(search);
        let list = PRODUCTS.filter(product => {
          const matchCategory = category === 'Усі' || product.category === category;
          const matchSubcategory = subcategory === 'Усі' || product.subcategory === subcategory;
          const matchAvailability = availability === 'Усі' || product.availability === availability;
          const matchPromo = promo === 'Усі' || product.promoType === promo || product.badges.includes(promo);
          const searchable = cleanQuery([
            product.name,
            product.brand,
            product.category,
            product.subcategory,
            product.shortDescription,
            product.categoryPath,
            product.sourceSection
          ].join(' '));
          const matchSearch = !q || searchable.includes(q);

          let matchPrice = true;
          if (priceRange === 'До 500 грн') matchPrice = product.price <= 500;
          if (priceRange === '500–1000 грн') matchPrice = product.price > 500 && product.price <= 1000;
          if (priceRange === '1000–2000 грн') matchPrice = product.price > 1000 && product.price <= 2000;
          if (priceRange === 'Від 2000 грн') matchPrice = product.price > 2000;

          return matchCategory && matchSubcategory && matchAvailability && matchPromo && matchSearch && matchPrice;
        });

        if (sort === 'priceAsc') list = [...list].sort((a, b) => a.price - b.price);
        if (sort === 'priceDesc') list = [...list].sort((a, b) => b.price - a.price);
        if (sort === 'name') list = [...list].sort((a, b) => a.name.localeCompare(b.name, 'uk'));
        if (sort === 'promo') list = [...list].sort((a, b) => Number(b.promoType !== 'Стандарт') - Number(a.promoType !== 'Стандарт'));

        return list;
      }, [category, subcategory, availability, promo, search, priceRange, sort]);

                <input

                  onChange={e => setSearch(e.target.value)}

                  className="bg-transparent outline-none w-full text-sm"

            </div>

                  <FilterPill key={item} active={category === item} onClick={() => { setCategory(item); setSubcategory('Усі'); }}>
                    {item}

                ))}
              </FilterBlock>

              <FilterBlock title="Підкатегорія">
                <select value={subcategory} onChange={e => setSubcategory(e.target.value)} className="w-full rounded-xl border border-brand-100 bg-white px-4 py-3 text-sm outline-none">
                  {subcategories.map(item => <option key={item} value={item}>{item}</option>)}

              </FilterBlock>

              <FilterBlock title="Ціна">
                {['Усі', 'До 500 грн', '500–1000 грн', '1000–2000 грн', 'Від 2000 грн'].map(item => (
                  <FilterPill key={item} active={priceRange === item} onClick={() => setPriceRange(item)}>{item}</FilterPill>
                ))}
              </FilterBlock>

              <FilterBlock title="Акції та формати">
                {['Усі', 'Акція', 'Набори', 'Допродажі'].map(item => (

              <FilterBlock title="Наявність">

                  <FilterPill key={item} active={availability === item} onClick={() => setAvailability(item)}>{item}</FilterPill>
                ))}
              </FilterBlock>

              <button
                onClick={() => {
                  setCategory('Усі'); setSubcategory('Усі'); setPriceRange('Усі'); setPromo('Усі'); setAvailability('Усі'); setSort('default'); setSearch('');
                  navigate({ name: 'catalog' });

              >

            <div>

                <select value={sort} onChange={e => setSort(e.target.value)} className="rounded-xl border border-brand-100 bg-white px-4 py-3 text-sm outline-none">

              {filtered.length ? (

                  <p className="mt-3 text-brand-400">Змініть фільтр або пошуковий запит.</p>
                </div>
              )}
            </div>
          </div>
        </section>
      );

      return (
        <div className="fixed inset-0 z-50">
          <button onClick={close} className="absolute inset-0 bg-black/20 backdrop-blur-sm fade-in" aria-label="Закрити кошик"></button>
          <aside className="slide-in absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col">
            <div className="p-6 flex items-center justify-between border-b border-brand-100">
              <div>
                <h2 className="text-xl font-semibold">Ваш кошик</h2>
                <p className="text-sm text-brand-400">{items.length ? `${items.reduce((s, i) => s + i.qty, 0)} товарів` : 'Кошик порожній'}</p>
              </div>
              <button onClick={close} className="p-2 hover:bg-brand-100 rounded-full transition">✕</button>
            </div>

            <div className="flex-1 overflow-y-auto p-6 space-y-5 hide-scroll">
              {items.length === 0 ? (
                <div className="text-center py-12">
                  <p className="text-brand-400">Додайте товари для оформлення замовлення.</p>
                  <button onClick={() => navigate({ name: 'catalog' })} className="mt-5 bg-brand-900 text-white rounded px-6 py-3 text-sm font-medium">Перейти до товарів</button>
                </div>
              ) : items.map(({ product, qty }) => (
                <div key={product.id} className="flex gap-4">
                  <button onClick={() => navigate({ name: 'product', id: product.id })} className="w-20 shrink-0 rounded overflow-hidden bg-brand-100">
                    <ProductImage product={product} className="aspect-[4/5]" />
                  </button>
                  <div className="flex-1">
                    <div className="flex gap-3 justify-between">
                      <div>
                        <h3 className="text-sm font-medium leading-snug">{product.name}</h3>
                        <p className="text-xs text-brand-400 mt-1">{formatPrice(product.price)}</p>
                      </div>
                      <button onClick={() => removeFromCart(product.id)} className="text-brand-400 hover:text-brand-900">✕</button>
                    </div>
                    <div className="flex items-center justify-between mt-3">
                      <div className="flex items-center border border-brand-100 rounded">
                        <button onClick={() => updateQty(product.id, qty - 1)} className="px-3 py-1 text-brand-400">−</button>
                        <span className="w-8 text-center text-sm">{qty}</span>
                        <button onClick={() => updateQty(product.id, qty + 1)} className="px-3 py-1 text-brand-400">+</button>
                      </div>
                      <span className="font-medium">{formatPrice(product.price * qty)}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <div className="p-6 border-t border-brand-100 bg-brand-50">
              <div className="flex justify-between mb-4 text-lg font-semibold">
                <span>Разом</span>
                <span>{formatPrice(total)}</span>
              </div>
              <button
                disabled={!items.length}
                onClick={() => navigate({ name: 'checkout' })}
                className="w-full bg-brand-900 text-white py-4 rounded text-sm font-medium hover:bg-brand-800 transition disabled:bg-brand-300 disabled:cursor-not-allowed"
              >
                Оформити замовлення
              </button>
            </div>
          </aside>
        </div>
      );
    }

    function Checkout({ cart, cartTotal, navigate, updateQty, removeFromCart, clearCart }) {
      const [submitted, setSubmitted] = useState(false);
      const [form, setForm] = useState({
        name: '',
        phone: '',
        email: '',
        delivery: 'Нова пошта',
        payment: 'Оплата при отриманні',
        city: '',
        comment: ''
      });

      const items = cart.map(item => ({ ...item, product: PRODUCTS.find(p => p.id === item.id) })).filter(item => item.product);

      function change(e) {
        setForm(prev => ({ ...prev, [e.target.name]: e.target.value }));
      }

      function submit(e) {
        e.preventDefault();
        if (!items.length) return;
        setSubmitted(true);
        clearCart();
      }

      if (submitted) {
        return (
          <section className="max-w-3xl mx-auto px-4 py-16 text-center fade-in">
            <div className="soft-card rounded-[2rem] p-8 md:p-12">
              <p className="text-xs uppercase tracking-[.3em] text-brand-400 font-semibold">замовлення прийнято</p>
              <h1 className="mt-4 text-3xl md:text-5xl font-light">Дякуємо, {form.name || 'ваше замовлення оформлено'}.</h1>
              <p className="mt-5 text-brand-400 leading-8">Ваше замовлення сформовано. Менеджер зв’яжеться з вами для підтвердження деталей, наявності товарів, оплати та доставки.</p>
              <button onClick={() => navigate({ name: 'home' })} className="mt-8 bg-brand-900 text-white rounded px-8 py-4 text-sm font-medium">На головну</button>
            </div>
          </section>
        );
      }

      return (
        <section className="max-w-7xl mx-auto px-4 py-10 pb-20 fade-in">
          <button onClick={() => navigate({ name: 'catalog' })} className="text-sm font-medium text-brand-400 hover:text-brand-900 mb-6">← Продовжити покупки</button>

          <div className="grid lg:grid-cols-[1fr_420px] gap-8">
            <form onSubmit={submit} className="soft-card rounded-[2rem] p-6 md:p-9">
              <p className="text-xs uppercase tracking-[.3em] text-brand-400 font-semibold">checkout</p>
              <h1 className="mt-3 text-3xl md:text-5xl font-light">Оформлення замовлення</h1>

              <div className="grid gap-5 mt-8">
                <TextInput label="ПІБ" name="name" value={form.name} onChange={change} required placeholder="Ваше ім’я та прізвище" />
                <div className="grid md:grid-cols-2 gap-5">
                  <TextInput label="Телефон" name="phone" value={form.phone} onChange={change} required placeholder="+380..." />
                  <TextInput label="Email" name="email" type="email" value={form.email} onChange={change} required placeholder="email@example.com" />
                </div>
                <TextInput label="Місто / відділення" name="city" value={form.city} onChange={change} placeholder="Наприклад: Київ, НП №12" />
                <div className="grid md:grid-cols-2 gap-5">
                  <SelectInput label="Доставка" name="delivery" value={form.delivery} onChange={change} options={['Нова пошта', 'Кур’єрська доставка', 'Самовивіз']} />
                  <SelectInput label="Оплата" name="payment" value={form.payment} onChange={change} options={['Оплата при отриманні', 'Онлайн-оплата карткою', 'Банківський переказ']} />
                </div>
                <label>
                  <span className="block text-sm font-medium mb-2">Коментар</span>
                  <textarea name="comment" value={form.comment} onChange={change} rows="4" className="w-full rounded-xl border border-brand-100 bg-white px-4 py-3 outline-none focus:border-brand-300" placeholder="Додаткова інформація до замовлення"></textarea>
                </label>
              </div>

              <button disabled={!items.length} className="mt-8 w-full bg-brand-900 text-white rounded py-4 text-sm font-medium hover:bg-brand-800 transition disabled:bg-brand-300">
                Підтвердити замовлення
              </button>
            </form>

            <aside className="soft-card rounded-[2rem] p-5 h-fit lg:sticky lg:top-28">
              <h2 className="text-xl font-semibold">Склад замовлення</h2>
              <div className="mt-5 space-y-4">
                {items.length ? items.map(({ product, qty }) => (
                  <div key={product.id} className="bg-white border border-brand-100 rounded-xl p-4">
                    <div className="flex justify-between gap-3">
                      <div>
                        <h3 className="text-sm font-medium leading-snug">{product.name}</h3>
                        <p className="text-xs text-brand-400 mt-1">{formatPrice(product.price)} × {qty}</p>
                      </div>
                      <button onClick={() => removeFromCart(product.id)} type="button" className="text-brand-400">✕</button>
                    </div>
                    <div className="flex items-center mt-3 border border-brand-100 rounded w-fit">
                      <button onClick={() => updateQty(product.id, qty - 1)} type="button" className="px-3 py-1 text-brand-400">−</button>
                      <span className="w-8 text-center text-sm">{qty}</span>
                      <button onClick={() => updateQty(product.id, qty + 1)} type="button" className="px-3 py-1 text-brand-400">+</button>
                    </div>
                  </div>
                )) : <p className="text-brand-400">Кошик порожній.</p>}
              </div>

              <div className="mt-6 pt-5 border-t border-brand-100 flex justify-between text-lg font-semibold">
                <span>Разом</span>
                <span>{formatPrice(cartTotal)}</span>
              </div>
            </aside>
          </div>
        </section>
      );
    }

    function TextInput({ label, ...props }) {
      return (
        <label>
          <span className="block text-sm font-medium mb-2">{label}</span>
          <input {...props} className="w-full rounded-xl border border-brand-100 bg-white px-4 py-3 outline-none focus:border-brand-300" />
        </label>
      );
    }

    function SelectInput({ label, options, ...props }) {
      return (
        <label>
          <span className="block text-sm font-medium mb-2">{label}</span>
          <select {...props} className="w-full rounded-xl border border-brand-100 bg-white px-4 py-3 outline-none focus:border-brand-300">
            {options.map(option => <option key={option} value={option}>{option}</option>)}
          </select>
        </label>
      );
    }

    function InfoPage({ pageKey, navigate }) {
      const page = INFO_PAGES[pageKey] || INFO_PAGES.delivery;
      return (
        <section className="max-w-5xl mx-auto px-4 py-12 pb-20 fade-in">
          <button onClick={() => navigate({ name: 'home' })} className="text-sm font-medium text-brand-400 hover:text-brand-900 mb-6">← На головну</button>
          <div className="soft-card rounded-[2rem] p-8 md:p-12">
            <p className="text-xs uppercase tracking-[.3em] text-brand-400 font-semibold">інформація</p>
            <h1 className="mt-4 text-3xl md:text-5xl font-light">{page.title}</h1>
            <p className="mt-5 text-brand-400 leading-8 max-w-3xl">{page.intro}</p>
            <div className="grid gap-4 mt-8">
              {page.blocks.map(([title, text]) => (
                <div key={title} className="bg-white border border-brand-100 rounded-2xl p-6">
                  <h2 className="font-semibold text-lg">{title}</h2>
                  <p className="mt-3 text-brand-400 leading-7">{text}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Footer({ navigate }) {
      return (
        <footer className="bg-brand-900 text-brand-400 mt-12" id="footer">
          <div className="max-w-7xl mx-auto px-4 py-12 grid md:grid-cols-4 gap-8">
            <div className="md:col-span-2">
              <button onClick={() => navigate({ name: 'home' })} className="brand-logo text-white text-2xl">
                zy<strong>nova</strong>
              </button>
              <p className="mt-4 max-w-md text-sm leading-7">
                Zynova — онлайн-магазин товарів для здоров’я, краси, щоденного догляду та wellness-підтримки.
              </p>
            </div>
            <div>
              <h3 className="text-white font-medium mb-4">Категорії</h3>
              <div className="grid gap-2 text-sm">
                {MAIN_CATEGORIES.map(category => (
                  <button key={category} onClick={() => navigate({ name: 'catalog', category })} className="text-left hover:text-white transition">{category}</button>
                ))}
              </div>
            </div>
            <div>
              <h3 className="text-white font-medium mb-4">Інформація</h3>
              <div className="grid gap-2 text-sm">
                <button onClick={() => navigate({ name: 'info', pageKey: 'delivery' })} className="text-left hover:text-white transition">Оплата і доставка</button>
                <button onClick={() => navigate({ name: 'info', pageKey: 'returns' })} className="text-left hover:text-white transition">Обмін і повернення</button>
                <button onClick={() => navigate({ name: 'info', pageKey: 'privacy' })} className="text-left hover:text-white transition">Політика конфіденційності</button>
              </div>
              <p className="mt-5 text-sm">hello@zynova.com.ua</p>
            </div>
          </div>
          <div className="border-t border-brand-800 py-5 text-center text-sm">
            © 2026 zynova.com.ua. Всі права захищено.
          </div>
        </footer>
      );
    }

    function SearchIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-3.2-3.2"></path>
        </svg>
      );
    }

    function BagIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
          <path d="M6.5 8.5h11l1 12h-13l1-12Z"></path>
          <path d="M9 8.5V7a3 3 0 0 1 6 0v1.5"></path>
        </svg>
      );
    }

    function MenuIcon({ className }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
          <path d="M4 7h16M4 12h16M4 17h16"></path>
        </svg>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
